<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加頁手記地圖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath fill='%23111' d='M50 20 L20 5 L28 32 Q15 42 15 58 Q15 85 50 90 Q85 85 85 58 Q85 42 72 32 L80 5 Z'/%3E%3Ccircle cx='36' cy='55' r='4' fill='%23E8A33D'/%3E%3Ccircle cx='64' cy='55' r='4' fill='%23E8A33D'/%3E%3Cpath d='M45 65 L50 70 L55 65' stroke='%23000' stroke-width='2' fill='none'/%3E%3C/svg%3E">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --blueprint:#000000;
    --blueprint-2:#0D0D0D;
    --blueprint-3:#161616;
    --line:#8FC1E3;
    --line-dim:#333333;
    --paper:#000000;
    --paper-2:#1B1B1B;
    --ink:#ECE7D8;
    --accent:#E8A33D;
    --accent-2:#D6862A;
    --muted:#8A8A8A;
    --danger:#C0604A;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--blueprint);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
  }
  .app{max-width:1080px;margin:0 auto;padding:0 20px 80px;}

  header.top{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 0 16px; gap:16px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand .mark{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:22px;
    letter-spacing:.02em;
  }
  .brand .sub{font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--line); letter-spacing:.12em; text-transform:uppercase;}

  nav.crumbs{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:.04em;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap; color:var(--muted);
    padding-bottom:10px; border-bottom:1px dashed var(--line-dim); margin-bottom:28px;
  }
  nav.crumbs .step{display:flex; align-items:center; gap:8px;}
  nav.crumbs .num{
    width:18px;height:18px;border:1px solid currentColor;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;font-size:10px;
  }
  nav.crumbs .step.active{color:var(--accent);}
  nav.crumbs .step.done{color:var(--line); cursor:pointer;}
  nav.crumbs .step.done:hover{color:#fff;}
  nav.crumbs .sep{color:var(--line-dim);}

  h1.title{font-family:'Space Grotesk', sans-serif; font-size:26px; margin:0 0 4px; font-weight:600;}
  p.hint{color:var(--line); font-size:13.5px; margin:0 0 28px; font-family:'IBM Plex Mono', monospace;}

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:16px;
  }
  .card{
    background:var(--paper); border-radius:var(--radius); overflow:hidden; cursor:pointer;
    border:1px solid var(--paper-2); text-align:left; padding:0; color:var(--ink);
    display:flex; flex-direction:column; transition:transform .15s ease, box-shadow .15s ease;
    position:relative;
  }
  .card:hover{transform:translateY(-3px); box-shadow:0 10px 24px rgba(0,0,0,.35);}
  .card:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .card .thumb{
    aspect-ratio:4/3; width:100%; background:var(--paper-2);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .card .thumb img{width:100%; height:100%; object-fit:contain; display:block;}
  .card .label{
    font-family:'IBM Plex Mono', monospace; font-size:12.5px; padding:9px 10px;
    border-top:1px dashed var(--paper-2); display:flex; align-items:center; justify-content:space-between;
  }
  .card .label .go{color:var(--accent-2); font-weight:600;}

  .empty{
    font-family:'IBM Plex Mono', monospace; color:var(--muted); font-size:13px;
    border:1px dashed var(--line-dim); padding:26px; border-radius:var(--radius);
  }

  .floor-panel{background:var(--paper); border-radius:var(--radius); padding:18px; color:var(--ink);}
  .floor-tabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .floor-tab{
    font-family:'IBM Plex Mono', monospace; font-size:13px; letter-spacing:.06em;
    background:var(--paper-2); color:var(--ink); border:1px solid transparent; padding:8px 16px;
    border-radius:var(--radius); cursor:pointer; text-transform:uppercase;
  }
  .floor-tab.active{background:var(--accent); color:#1B2838; font-weight:600;}
  .floor-tab:hover:not(.active){background:#DDD4BC;}
  .map-frame{
    border:1px solid var(--paper-2); background:repeating-linear-gradient(45deg, #000 0 10px, #0A0A0A 10px 20px);
    display:flex; align-items:center; justify-content:center; min-height:260px; border-radius:var(--radius);
    overflow:auto;
  }
  .map-frame img{max-width:100%; display:block;}
  .map-caption{font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--muted); margin-top:10px;}

  .loading{font-family:'IBM Plex Mono', monospace; color:var(--line); font-size:13px; padding:20px 0;}
  .err{font-family:'IBM Plex Mono', monospace; color:#F2B8A8; background:rgba(192,96,74,.15); border:1px solid var(--danger); padding:14px 16px; border-radius:var(--radius); font-size:12.5px; line-height:1.6;}

  footer.foot{margin-top:50px; padding-top:16px; border-top:1px dashed var(--line-dim); font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--muted); text-align:center;}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <span class="mark">加頁手記地圖</span>
      <span class="sub">form 阿蝦</span>
    </div>
  </header>

  <nav class="crumbs" id="crumbs"></nav>

  <div id="view"></div>

  <footer class="foot"第五人格怪還是太少了</footer>
</div>

<script>
/* =========================================================================
   設定區：請把下面三個網址換成你自己的 Google 試算表「發布到網路 CSV」網址
   （每個分頁 Doors / PartialMaps / FullMaps 各發布一次）
   教學請見附上的 SETUP-GUIDE.md
   ========================================================================= */
const CONFIG = {
  DOORS_CSV_URL:        "https://docs.google.com/spreadsheets/d/e/2PACX-1vQRr3B1rK-O7b9m9Ak50I6WvUMPD15MFPz4uOjVJGbrL0ER2z3Sw205_tT1GtU0_zhPatbdXstTmg1G/pub?gid=0&single=true&output=csv",
  PARTIAL_MAPS_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQRr3B1rK-O7b9m9Ak50I6WvUMPD15MFPz4uOjVJGbrL0ER2z3Sw205_tT1GtU0_zhPatbdXstTmg1G/pub?gid=288948299&single=true&output=csv",
  FULL_MAPS_CSV_URL:    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQRr3B1rK-O7b9m9Ak50I6WvUMPD15MFPz4uOjVJGbrL0ER2z3Sw205_tT1GtU0_zhPatbdXstTmg1G/pub?gid=886262015&single=true&output=csv",
};
/* ========================================================================= */

// ---- demo data (used automatically until CONFIG above is filled in) ----
const DEMO_MODE = CONFIG.DOORS_CSV_URL.startsWith("PASTE_");

const DEMO_DOORS = [
  {id:"A", name:"拱形側門", image_url: svgDoor("arch")},
  {id:"B", name:"矩形側門", image_url: svgDoor("rect")},
  {id:"C", name:"雙開側門", image_url: svgDoor("double")},
  {id:"D", name:"推拉側門", image_url: svgDoor("slide")},
];
const DEMO_PARTIALS = [
  {id:"1", door_id:"A", image_url: svgMap("A 區局部", "#DDE7EF"), label:"A區 — 入口周邊"},
  {id:"2", door_id:"A", image_url: svgMap("A 區局部2", "#E7E0CE"), label:"A區 — 走廊轉角"},
  {id:"3", door_id:"B", image_url: svgMap("B 區局部", "#DDE7EF"), label:"B區 — 入口周邊"},
  {id:"4", door_id:"C", image_url: svgMap("C 區局部", "#E7E0CE"), label:"C區 — 入口周邊"},
  {id:"5", door_id:"D", image_url: svgMap("D 區局部", "#DDE7EF"), label:"D區 — 入口周邊"},
];
const DEMO_FULL = [
  {id:"1", door_id:"A", floor:"1F", image_url: svgMap("A 區 1樓 完整地圖", "#F3EFE2"), label:"1樓平面圖"},
  {id:"2", door_id:"A", floor:"2F", image_url: svgMap("A 區 2樓 完整地圖", "#F3EFE2"), label:"2樓平面圖"},
  {id:"3", door_id:"B", floor:"1F", image_url: svgMap("B 區 1樓 完整地圖", "#F3EFE2"), label:"1樓平面圖"},
  {id:"4", door_id:"B", floor:"2F", image_url: svgMap("B 區 2樓 完整地圖", "#F3EFE2"), label:"2樓平面圖"},
  {id:"5", door_id:"C", floor:"1F", image_url: svgMap("C 區 1樓 完整地圖", "#F3EFE2"), label:"1樓平面圖"},
  {id:"6", door_id:"C", floor:"2F", image_url: svgMap("C 區 2樓 完整地圖", "#F3EFE2"), label:"2樓平面圖"},
  {id:"7", door_id:"D", floor:"1F", image_url: svgMap("D 區 1樓 完整地圖", "#F3EFE2"), label:"1樓平面圖"},
  {id:"8", door_id:"D", floor:"2F", image_url: svgMap("D 區 2樓 完整地圖", "#F3EFE2"), label:"2樓平面圖"},
];

function svgDoor(kind){
  const shapes = {
    arch: `<path d="M30 110 V55 A30 30 0 0 1 90 55 V110 Z" fill="none" stroke="#182634" stroke-width="4"/><line x1="60" y1="30" x2="60" y2="110" stroke="#182634" stroke-width="2" stroke-dasharray="4 3"/>`,
    rect: `<rect x="30" y="20" width="60" height="90" fill="none" stroke="#182634" stroke-width="4"/><line x1="60" y1="20" x2="60" y2="110" stroke="#182634" stroke-width="2" stroke-dasharray="4 3"/>`,
    double: `<rect x="18" y="20" width="42" height="90" fill="none" stroke="#182634" stroke-width="4"/><rect x="60" y="20" width="42" height="90" fill="none" stroke="#182634" stroke-width="4"/>`,
    slide: `<rect x="20" y="30" width="80" height="70" fill="none" stroke="#182634" stroke-width="4"/><line x1="60" y1="30" x2="60" y2="100" stroke="#182634" stroke-width="2"/><path d="M25 20 h30 M65 20 h30" stroke="#182634" stroke-width="2" marker-end="url(#arrow)"/>`,
  };
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#182634"/></marker></defs>
    <rect width="120" height="120" fill="#F5F1E6"/>${shapes[kind]}</svg>`;
  return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
}
function svgMap(text, bg){
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220">
    <rect width="320" height="220" fill="${bg}"/>
    <g stroke="#B9AF97" stroke-width="1">
      ${Array.from({length:8}).map((_,i)=>`<line x1="${i*40}" y1="0" x2="${i*40}" y2="220"/>`).join('')}
      ${Array.from({length:6}).map((_,i)=>`<line x1="0" y1="${i*40}" x2="320" y2="${i*40}"/>`).join('')}
    </g>
    <rect x="40" y="30" width="90" height="60" fill="none" stroke="#182634" stroke-width="2"/>
    <rect x="150" y="60" width="120" height="90" fill="none" stroke="#182634" stroke-width="2"/>
    <text x="160" y="200" font-family="monospace" font-size="13" fill="#182634" text-anchor="middle">${text}</text>
  </svg>`;
  return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
}

// ---- app state ----
let DOORS = [], PARTIALS = [], FULLS = [];
let state = { screen:"doors", doorId:null, floor:null };

const viewEl = document.getElementById("view");
const crumbsEl = document.getElementById("crumbs");

function csvToObjects(csvText){
  const res = Papa.parse(csvText.trim(), {header:true, skipEmptyLines:true});
  return res.data.map(row=>{
    const clean = {};
    Object.keys(row).forEach(k=> clean[k.trim()] = (row[k]||"").toString().trim());
    return clean;
  });
}

async function fetchCsv(url){
  const res = await fetch(url, {cache:"no-store"});
  if(!res.ok) throw new Error("HTTP " + res.status);
  return csvToObjects(await res.text());
}

async function loadData(){
  if(DEMO_MODE){
    DOORS = DEMO_DOORS; PARTIALS = DEMO_PARTIALS; FULLS = DEMO_FULL;
    return;
  }
  viewEl.innerHTML = `<div class="loading">讀取資料中 …</div>`;
  const [doors, partials, fulls] = await Promise.all([
    fetchCsv(CONFIG.DOORS_CSV_URL),
    fetchCsv(CONFIG.PARTIAL_MAPS_CSV_URL),
    fetchCsv(CONFIG.FULL_MAPS_CSV_URL),
  ]);
  DOORS = doors; PARTIALS = partials; FULLS = fulls;
}

function doorName(id){
  const d = DOORS.find(d=>d.id===id);
  return d ? d.name : id;
}

function renderCrumbs(){
  const steps = [
    {key:"doors", label:"選擇側門形狀"},
    {key:"partials", label:"部分地圖比對"},
    {key:"full", label:"完整地圖"},
  ];
  const order = {doors:0, partials:1, full:2};
  const current = order[state.screen];
  crumbsEl.innerHTML = steps.map((s,i)=>{
    const cls = i===current ? "active" : (i<current ? "done" : "");
    return `<span class="step ${cls}" data-step="${s.key}"><span class="num">${i+1}</span>${s.label}${state.doorId && s.key!=="doors" ? "" : ""}</span>${i<steps.length-1 ? '<span class="sep">›</span>':''}`;
  }).join("");
  crumbsEl.querySelectorAll(".step.done").forEach(el=>{
    el.addEventListener("click", ()=>{
      const step = el.dataset.step;
      if(step==="doors"){ state.screen="doors"; state.doorId=null; state.floor=null; render(); }
      if(step==="partials" && state.doorId){ state.screen="partials"; render(); }
    });
  });
}

function render(){
  renderCrumbs();
  if(state.screen==="doors") return renderDoors();
  if(state.screen==="partials") return renderPartials();
  if(state.screen==="full") return renderFull();
}

function renderDoors(){
  viewEl.innerHTML = `
    <h1 class="title">側門形狀</h1>
    <p class="hint">三步驟簡單查詢</p>
    ${DOORS.length ? `<div class="grid">${DOORS.map(d=>`
      <button class="card" data-id="${d.id}">
        <div class="thumb"><img src="${d.image_url}" alt="${d.name}" loading="lazy"></div>
        <div class="label"><span>${d.name}</span><span class="go">選取 →</span></div>
      </button>
    `).join("")}</div>` : `<div class="empty">目前沒有任何側門圖片，請至 Google 試算表的 Doors 分頁新增。</div>`}
  `;
  viewEl.querySelectorAll(".card").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.doorId = el.dataset.id;
      state.screen = "partials";
      render();
    });
  });
}

function renderPartials(){
  const list = PARTIALS.filter(p=>p.door_id===state.doorId);
  viewEl.innerHTML = `
    <h1 class="title">${doorName(state.doorId)} — 局部地圖比對</h1>
    <p class="hint">// 點擊與現場相符的局部地圖，確認後將顯示完整平面圖</p>
    ${list.length ? `<div class="grid">${list.map(p=>`
      <button class="card" data-id="${p.id}">
        <div class="thumb"><img src="${p.image_url}" alt="${p.label||''}" loading="lazy"></div>
        <div class="label"><span>${p.label || "局部地圖"}</span><span class="go">確認 →</span></div>
      </button>
    `).join("")}</div>` : `<div class="empty">這個側門形狀目前沒有對應的局部地圖，請至 PartialMaps 分頁新增（door_id 需對應 "${state.doorId}"）。</div>`}
  `;
  viewEl.querySelectorAll(".card").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.screen = "full";
      state.floor = null;
      render();
    });
  });
}

function renderFull(){
  const list = FULLS.filter(f=>f.door_id===state.doorId);
  const floors = [...new Set(list.map(f=>f.floor))].sort();
  if(!state.floor || !floors.includes(state.floor)) state.floor = floors[0] || null;
  const current = list.find(f=>f.floor===state.floor);

  viewEl.innerHTML = `
    <h1 class="title">${doorName(state.doorId)} — 完整平面圖</h1>
    <p class="hint">// 切換樓層查看完整地圖</p>
    ${list.length ? `
      <div class="floor-panel">
        <div class="floor-tabs">
          ${floors.map(fl=>`<button class="floor-tab ${fl===state.floor?'active':''}" data-floor="${fl}">${fl}</button>`).join("")}
        </div>
        <div class="map-frame">${current ? `<img src="${current.image_url}" alt="${current.label||current.floor}">` : `<div class="empty">此樓層尚無地圖</div>`}</div>
        ${current && current.label ? `<div class="map-caption">${current.label}</div>` : ""}
      </div>
    ` : `<div class="empty">這個側門形狀目前沒有對應的完整地圖，請至 FullMaps 分頁新增（door_id 需對應 "${state.doorId}"）。</div>`}
  `;
  viewEl.querySelectorAll(".floor-tab").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.floor = el.dataset.floor;
      renderFull();
    });
  });
}

(async function init(){
  try{
    await loadData();
    render();
  }catch(e){
    viewEl.innerHTML = `<div class="err">
      資料讀取失敗：${e.message}<br><br>
      請確認：<br>
      1. 已將 Google 試算表「發布到網路」為 CSV 格式<br>
      2. index.html 最上方 CONFIG 內的三個網址已正確貼上<br>
      3. 試算表分享權限設定為「知道連結的人」可檢視
    </div>`;
  }
})();
</script>
</body>
</html>
